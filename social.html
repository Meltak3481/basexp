<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#04060f">
<title>BaseXP — Invite</title>
<meta name="base:app_id" content="6a18a84807babdffa06b0f05" />
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="app-wrapper">
  <header class="app-header">
    <div class="brand"><div class="brand-logo">🎁</div><div class="brand-name">Base<b>XP</b></div></div>
    <div class="wallet-chip" id="wallet-chip" onclick="onWalletChip()">
      <div class="wallet-dot" id="wallet-dot"></div><span id="wallet-addr">Connect</span>
      <span class="wallet-balance hidden" id="wallet-bal"></span>
    </div>
  </header>

  <h1 class="page-title reveal">Invite Friends 🎁</h1>
  <p class="page-sub reveal">Share BaseXP and you both earn bonus XP.</p>

  <div id="invite-body" class="reveal"></div>

  <div class="page-bottom"></div>
</div>

<nav class="bottom-nav" style="display:none;"></nav>
<div class="connect-gate" id="connect-gate">
  <div class="gate-egg">🎁</div><div class="gate-title text-gradient-blue">Invite & Earn</div>
  <div class="gate-sub">Connect your wallet to get your referral code and invite friends for bonus XP.</div>
  <button class="btn btn--primary btn--lg btn--shine" onclick="WalletModal.show()">🔗 Connect Wallet</button>
</div>
<div id="toast-container" class="toast-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
<script src="shared.js"></script>
<script>
const $ = id => document.getElementById(id);
function onWalletChip() { if (AppState.wallet.connected) { if (confirm('Disconnect wallet?')) Wallet.disconnect(); } else WalletModal.show(); }

function renderInvite() {
  const c = AppState.character;
  if (!c) { $('connect-gate').classList.add('show'); return; }
  $('connect-gate').classList.remove('show');
  const code = Utils.generateReferralCode(c.owner);
  const used = LS.getSetting('ref_used', false);
  const invited = LS.getSetting('ref_invited', 0);
  const evo = XP.getEvolution(c.level);

  $('invite-body').innerHTML = `
    <div class="ref-card">
      <div style="font-family:var(--font-display);font-weight:800;font-size:19px">Your referral code 🔗</div>
      <p style="color:var(--text-secondary);font-size:13px;margin-top:4px">You get <b style="color:var(--neon-green)">+200 XP</b> for every friend who joins with your code — and they get <b style="color:var(--neon-green)">+200 XP</b> too!</p>
      <div class="ref-code-box">
        <span class="ref-code">${code}</span>
        <button class="btn btn--primary btn--sm" onclick="Utils.copy('${code}')">Copy</button>
      </div>
      <div class="flex gap-sm" style="margin-top:12px">
        <button class="btn btn--ghost btn--full btn--sm" onclick="shareRef('twitter','${code}')">𝕏 Share</button>
        <button class="btn btn--ghost btn--full btn--sm" onclick="shareRef('telegram','${code}')">✈️ Telegram</button>
      </div>
    </div>

    <div class="stat-grid" style="margin-bottom:18px">
      <div class="stat-box"><div class="stat-val mono text-gradient-gold">${invited}</div><div class="stat-label">Friends invited</div></div>
      <div class="stat-box"><div class="stat-val mono text-gradient-gold">${invited*200}</div><div class="stat-label">Bonus XP</div></div>
      <div class="stat-box"><div class="stat-val mono">Lv.${c.level}</div><div class="stat-label">${evo.name}</div></div>
    </div>

    <div class="section-header" style="margin-top:6px"><span class="section-title">Got a friend's code?</span></div>
    <div class="card">
      ${used
        ? '<p style="color:var(--neon-green);font-weight:600;text-align:center">✓ You already redeemed a referral code</p>'
        : `<input class="input-field" id="ref-input" placeholder="Enter code (BXP…)" maxlength="9" style="text-transform:uppercase;margin-bottom:10px">
           <button class="btn btn--green btn--full" onclick="redeemRef()">Redeem +200 XP</button>`}
    </div>

    <div class="card" style="margin-top:14px">
      <div style="font-weight:700;font-size:14px;margin-bottom:8px">How it works</div>
      <div style="color:var(--text-secondary);font-size:13px;line-height:1.7">
        1. Copy your code and share it with friends.<br>
        2. They enter it on their first visit.<br>
        3. You both instantly get +200 XP. No limit on how many you invite!
      </div>
    </div>`;
}

function shareRef(platform, code) {
  const url = 'https://basexp.xyz';
  const text = `Raise your crypto pet on BaseXP! Use my code ${code} for +200 XP 🥚🚀`;
  const link = platform === 'twitter'
    ? `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`
    : `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
  window.open(link, '_blank');
}

function redeemRef() {
  const c = AppState.character; if (!c) { WalletModal.show(); return; }
  const val = $('ref-input').value.trim().toUpperCase();
  if (!/^BXP[A-Z0-9]{6}$/.test(val)) { Toast.show('Invalid code format', 'error', '❌'); return; }
  if (val === Utils.generateReferralCode(c.owner)) { Toast.show("You can't use your own code 😅", 'warning', '🚫'); return; }
  if (LS.getSetting('ref_used', false)) { Toast.show('Already redeemed once', 'warning', '⏰'); return; }
  LS.setSetting('ref_used', true);
  XP.add(200, 'Referral bonus');
  Confetti.rain(80);
  fetch(`${CONFIG.WORKER_URL}/referral`, { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ address: c.owner, code: val }) }).catch(()=>{});
  renderInvite();
}

function updateWalletUI() {
  const w = AppState.wallet, chip = $('wallet-chip');
  if (w.connected) { chip.classList.add('connected'); $('wallet-addr').textContent = Wallet.shortAddr(w.address); $('wallet-bal').classList.remove('hidden'); $('wallet-bal').textContent = Wallet.formatUSDC(w.usdcBalance)+' USDC'; $('connect-gate').classList.remove('show'); }
  else { chip.classList.remove('connected'); $('wallet-addr').textContent='Connect'; $('wallet-bal').classList.add('hidden'); $('connect-gate').classList.add('show'); }
}

EventBus.on('character:loaded', renderInvite);
EventBus.on('wallet:connected', () => { updateWalletUI(); renderInvite(); });
EventBus.on('wallet:balance', updateWalletUI);
EventBus.on('wallet:disconnected', () => { updateWalletUI(); $('connect-gate').classList.add('show'); });
EventBus.on('xp:gained', renderInvite);

App.init('social');
</script>
</body>
</html>
